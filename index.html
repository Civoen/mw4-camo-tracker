<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MW4 Camo Tracker</title>
<meta property="og:type" content="website">
<meta property="og:title" content="MW4 Camo Tracker">
<meta property="og:description" content="A quick and easy way to track your camo grind.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="MW4 Camo Tracker">
<meta name="twitter:description" content="A quick and easy way to track your camo grind.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#131211">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="preload" href="site.css" as="style">
<link rel="preload" href="data.js" as="script">
<link rel="preload" href="site.js" as="script">
<link rel="stylesheet" href="site.css">
<style>
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 24px 130px;
  }
  .hero{
    max-width:680px;
    width:100%;
    text-align:center;
  }
  .hero h1{font-size:clamp(32px, 8vw, 54px);margin:14px 0 6px;}
  .hero .sub{font-size:clamp(13px, 3vw, 15px);margin:0 0 26px;}
  .home-progress{margin-bottom:26px;text-align:left;}
</style>
</head>
<body>
<div class="hero">
  <span class="eyebrow">Placeholder Data &middot; BO6 Weapons</span>
  <h1>MW4 Camo Tracker</h1>
  <div class="sub">A quick and easy way to track your camo grind</div>

  <div class="home-progress">
    <div class="progress-block" style="flex-direction:column;align-items:stretch;gap:12px;">
      <div class="big-pct" id="homeBigPct" style="text-align:left;">0%<span id="homeBigLabel">All Weapons &middot; Mastered</span></div>
    </div>
  </div>

  <div class="class-grid" id="classGrid"></div>

  <div class="manage-data-row">
    <a class="trader-btn" href="import.html">Manage Data</a>
  </div>
</div>

<div class="grind-list" id="grindList">
  <div class="grind-list-bar">
    <div class="grind-list-toggle" id="grindListToggle" role="button" tabindex="0">
      <span>Currently Grinding</span>
      <button class="grind-list-fullscreen" id="grindListFullscreen" type="button">Full Screen</button>
      <span class="grind-list-count" id="grindListCount">0</span>
    </div>
  </div>
  <div class="grind-list-panel" id="grindListPanel"></div>
</div>

<script src="data.js"></script>
<script src="site.js"></script>
<script>
renderClassSummary('classGrid');

(function(){
  const progress = loadCamoProgress();
  const total = WEAPONS.length;
  const done = WEAPONS.filter(w => isWeaponMastered(w.name, progress)).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('homeBigPct').innerHTML = pct + '%<span>All Weapons &middot; ' + done + ' of ' + total + ' mastered</span>';
})();
</script>
</body>
</html>
