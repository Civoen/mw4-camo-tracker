<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MW4 Camo Tracker</title>
<meta property="og:type" content="website">
<meta property="og:title" content="MW4 Camo Tracker">
<meta property="og:description" content="Track your Call of Duty: Modern Warfare 4 mastery camo grind, weapon by weapon.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="MW4 Camo Tracker">
<meta name="twitter:description" content="Track your Call of Duty: Modern Warfare 4 mastery camo grind, weapon by weapon.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#14171a">
<link rel="preload" href="site.css" as="style">
<link rel="preload" href="data.js" as="script">
<link rel="preload" href="site.js" as="script">
<link rel="stylesheet" href="site.css">
<style>
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 24px 110px;
  }
  .hero{
    max-width:640px;
    width:100%;
    text-align:center;
  }
  h1{
    font-size:clamp(30px, 8vw, 58px);
    letter-spacing:.06em;
    margin:0 0 10px;
  }
  .sub{
    font-size:clamp(13px, 3vw, 16px);
    color:var(--paper-dim);
    margin:0 0 22px;
    letter-spacing:.02em;
  }
  .badge{
    display:inline-block;
    background:var(--panel-2);
    border:1px solid var(--amber);
    color:var(--amber);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.08em;
    padding:6px 14px;
    margin-bottom:18px;
  }
  .search-wrap{width:100%;margin:0 auto 18px;}
  .search-wrap input{
    font-size:16px;
    padding:16px 18px;
  }
  .search-results{text-align:left;}
  .search-results div{font-size:14px;padding:11px 14px;}
  .btn-row{
    position:relative;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
  }
  .btn-row .trader-btn{font-size:clamp(12px, 3vw, 15px);padding:clamp(9px, 2.5vw, 14px) clamp(14px, 4vw, 26px);}
  .home-progress{margin-bottom:24px;}
  .home-progress-label{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--paper-dim);
    margin-bottom:6px;
  }
  .home-progress-track{
    background:var(--panel-2);
    border:1px solid var(--line);
    height:8px;
  }
  .home-progress-fill{
    background:var(--rust);
    height:100%;
    width:0%;
  }
</style>
</head>
<body>
<div class="hero">
  <div class="badge">Placeholder data &middot; Black Ops 6 weapons</div>
  <h1>MW4 Camo Tracker</h1>
  <div class="sub">Track your Modern Warfare 4 mastery camo grind, weapon by weapon</div>

  <div class="home-progress" id="homeProgressWrap">
    <div class="home-progress-label">
      <span id="homeProgressText">Overall mastery progress: 0 of 0</span>
      <span id="homeProgressPct">0%</span>
    </div>
    <div class="home-progress-track"><div class="home-progress-fill" id="homeProgressFill"></div></div>
  </div>

  <div class="search-wrap">
    <input type="text" id="taskSearch" placeholder="Search weapons..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="btn-row">
    <a class="trader-btn" href="camos.html">Camo Tracker</a>
    <a class="trader-btn" href="import.html">Manage Data</a>
  </div>
</div>

<div class="grind-list" id="grindList">
  <div class="grind-list-bar">
    <div class="grind-list-toggle" id="grindListToggle" role="button" tabindex="0">
      <span>Currently Grinding</span>
      <span class="grind-list-count" id="grindListCount">0</span>
    </div>
  </div>
  <div class="grind-list-panel" id="grindListPanel"></div>
</div>

<script src="data.js"></script>
<script src="site.js"></script>
<script>
(function(){
  const progress = loadCamoProgress();
  const total = WEAPONS.length;
  const done = WEAPONS.filter(w => {
    const p = progress[w.name] || {};
    return CAMO_TIERS.every(t => p[t.key]);
  }).length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('homeProgressText').textContent = 'Overall mastery progress: ' + done + ' of ' + total;
  document.getElementById('homeProgressPct').textContent = pct + '%';
  const fill = document.getElementById('homeProgressFill');
  fill.style.width = pct + '%';
  fill.style.background = pct >= 100 ? '#3cbf2d' : '';
})();
</script>
</body>
</html>
